<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Express - Proveedores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sidebar">
        <h2>Gourmet Express</h2>
        <nav>
            <a href="index.html">📊 Dashboard</a>
            <a href="proveedores.html" class="active">🚚 Proveedores</a>
            <a href="productos.html">📦 Productos</a>
            <a href="almacenes.html">🏢 Almacenes</a>
            <a href="lotes.html">🔢 Lotes</a>
        </nav>
    </div>

    <div class="main-content">
        <header style="margin-bottom: 2rem;">
            <h1>Gestión de Proveedores</h1>
            <p style="color: #8a8a98;">Registra y administra las empresas proveedoras de la cadena</p>
        </header>

        <section class="card" style="margin-bottom: 2.5rem; background: #1e1e24; padding: 1.5rem; border-radius: 8px;">
            <!-- ① título dinámico -->
            <h3 id="form-titulo" style="color: #ff9f43; margin-bottom: 1rem; font-size: 1.2rem;">
                Registrar Nuevo Proveedor
            </h3>
            <form id="form-proveedor" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">

                <!-- ② input hidden -->
                <input type="hidden" id="id-proveedor-editar">

                <div>
                    <label style="display:block; margin-bottom:0.3rem;">Nombre del Proveedor *</label>
                    <input type="text" id="nombre" required style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:0.3rem;">Ciudad *</label>
                    <input type="text" id="ciudad" required style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div style="grid-column: span 2;">
                    <label style="display:block; margin-bottom:0.3rem;">Dirección (Calle / Avenida) *</label>
                    <input type="text" id="calle" required style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div style="grid-column: span 2;">
                    <label style="display:block; margin-bottom:0.3rem;">Teléfonos de Contacto *</label>
                    <div id="contenedor-telefonos" style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.5rem;">
                        <input type="text" class="input-telefono" required placeholder="Ej: 3001234567" style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                    </div>
                    <button type="button" id="btn-agregar-telefono" style="background:transparent; border:1px solid #ff9f43; color:#ff9f43; padding:0.4rem 0.8rem; border-radius:4px; cursor:pointer; font-size:0.85rem;">
                        ➕ Añadir otro teléfono
                    </button>
                </div>
                <div style="grid-column: span 2; margin-top: 1rem; display:flex; gap:1rem;">
                    <button type="submit" style="background:#ff9f43; color:black; font-weight:bold; padding:0.7rem 1.5rem; border:none; border-radius:4px; cursor:pointer;">
                        Guardar Proveedor
                    </button>
                    <!-- ③ botón cancelar -->
                    <button type="button" id="btn-cancelar" style="display:none; background:transparent; color:#8a8a98; border:1px solid #8a8a98; padding:0.7rem 1.5rem; border-radius:4px; cursor:pointer;">
                        Cancelar
                    </button>
                </div>
            </form>
        </section>

        <section class="card" style="background: #1e1e24; padding: 1.5rem; border-radius: 8px;">
            <h3 style="color: white; margin-bottom: 1rem;">📋 Lista de Proveedores Registrados</h3>
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #2c2c35; color: #8a8a98;">
                        <th style="padding: 0.8rem;">ID</th>
                        <th style="padding: 0.8rem;">Proveedor</th>
                        <th style="padding: 0.8rem;">Ubicación (Ciudad, Calle)</th>
                        <th style="padding: 0.8rem;">Teléfonos</th>
                        <th style="padding: 0.8rem; text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-proveedores-body"></tbody>
            </table>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/proveedores.js"></script>
</body>
</html>
