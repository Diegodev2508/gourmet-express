<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Express - Productos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sidebar">
        <h2>Gourmet Express</h2>
        <nav>
            <a href="index.html">📊 Dashboard</a>
            <a href="proveedores.html">🚚 Proveedores</a>
            <a href="productos.html" class="active">📦 Productos</a>
            <a href="almacenes.html">🏢 Almacenes</a>
            <a href="lotes.html">🔢 Lotes</a>
        </nav>
    </div>

    <div class="main-content">
        <header style="margin-bottom: 2rem;">
            <h1>Catálogo de Productos</h1>
            <p style="color: #8a8a98;">Administración de insumos e ingredientes</p>
        </header>

        <section class="card" style="margin-bottom: 2.5rem; background: #1e1e24; padding: 1.5rem; border-radius: 8px;">
            <h3 style="color: #ff9f43; margin-bottom: 1rem; font-size: 1.2rem;">Registrar Nuevo Artículo</h3>
            <form id="form-producto" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                <div>
                    <label style="display:block; margin-bottom:0.3rem;">Nombre del Producto *</label>
                    <input type="text" id="nombre" required placeholder="Ej: Harina de Trigo" style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:0.3rem;">Precio de Venta ($) *</label>
                    <input type="number" id="precio" required min="0" placeholder="Ej: 4500" style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div style="grid-column: span 2;">
                    <label style="display:block; margin-bottom:0.3rem;">Descripción (opcional)</label>
                    <input type="text" id="descripcion" placeholder="Ej: Harina premium para panadería" style="width:100%; padding:0.6rem; background:#2c2c35; border:none; color:white; border-radius:4px;">
                </div>
                <div style="grid-column: span 2; margin-top: 0.5rem;">
                    <button type="submit" style="background: #ff9f43; color: black; font-weight: bold; padding: 0.7rem 1.5rem; border: none; border-radius: 4px; cursor: pointer;">
                        Guardar en Catálogo
                    </button>
                </div>
            </form>
        </section>

        <section class="card" style="background: #1e1e24; padding: 1.5rem; border-radius: 8px;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #2c2c35; color: #8a8a98;">
                        <th style="padding: 0.8rem;">Código</th>
                        <th style="padding: 0.8rem;">Nombre</th>
                        <th style="padding: 0.8rem;">Descripción</th>
                        <th style="padding: 0.8rem;">Precio Unitario</th>
                        <th style="padding: 0.8rem; text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos-body"></tbody>
            </table>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/productos.js"></script>
</body>
</html>
